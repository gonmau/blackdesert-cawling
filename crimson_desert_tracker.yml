name: 붉은사막 Steam 경쟁 트래커

on:
  schedule:
    # 매 6시간마다 실행 (UTC 기준: 0, 6, 12, 18시)
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      countries:
        description: "특정 국가 코드 (공백 구분, 비우면 전체). 예: KR US JP"
        required: false
        default: ""

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests

      - name: 트래커 실행
        run: |
          if [ -n "${{ github.event.inputs.countries }}" ]; then
            python crimson_desert_rival_tracker.py ${{ github.event.inputs.countries }}
          else
            python crimson_desert_rival_tracker.py
          fi

      - name: 히스토리 아카이브
        run: |
          mkdir -p data/history
          TIMESTAMP=$(date -u +"%Y%m%d_%H%M%S")
          cp data/crimson_desert_rivals.json "data/history/rivals_${TIMESTAMP}.json"
          
          # 히스토리 최대 100개 유지
          ls -t data/history/rivals_*.json | tail -n +101 | xargs -r rm

      - name: 대시보드 생성
        run: python generate_dashboard.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html
          git diff --staged --quiet || git commit -m "📊 Steam 트래커 업데이트 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
