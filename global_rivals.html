<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>붉은사막 글로벌 경쟁작 트래커</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0e1117; color: #e0e0e0; padding: 20px; max-width: 960px; }

  h1 { font-size: 1.3rem; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

  /* 상단 카드 */
  .rank-card {
    background: #1a1f2e;
    border: 1px solid #2a3050;
    border-radius: 12px;
    padding: 20px 28px;
    display: inline-flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 24px;
  }
  .rank-num { font-size: 3rem; font-weight: 700; color: #4a9eff; line-height: 1; }
  .rank-label { font-size: 0.78rem; color: #888; margin-bottom: 2px; }
  .rank-diff { font-size: 1.1rem; font-weight: 600; }
  .up   { color: #4caf50; }
  .down { color: #f44336; }
  .flat { color: #666; }

  /* 그래프 */
  .chart-wrap {
    background: #1a1f2e;
    border: 1px solid #2a3050;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
  }
  .chart-title { font-size: 0.85rem; color: #aaa; margin-bottom: 12px; }
  canvas { width: 100% !important; height: 180px !important; }

  /* 섹션 타이틀 */
  .section-title {
    font-size: 0.88rem;
    color: #aaa;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid #2a3050;
  }
  .count-badge {
    display: inline-block;
    font-size: 0.73rem;
    padding: 1px 8px;
    border-radius: 10px;
    margin-left: 6px;
  }
  .badge-free-pill { background: #1a3a1a; color: #66bb6a; }
  .badge-sale-pill { background: #1a2a3a; color: #42a5f5; }

  /* 테이블 */
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-bottom: 8px; }
  th {
    text-align: left; padding: 8px 12px;
    color: #555; font-weight: 500;
    background: #13171f;
    position: sticky; top: 0;
  }
  td { padding: 7px 12px; border-bottom: 1px solid #13171f; vertical-align: middle; }

  /* 행 색상 구분 */
  tr.row-free td       { background: #0f1e0f; }
  tr.row-free:hover td { background: #142814; }
  tr.row-sale td       { background: #0d1624; }
  tr.row-sale:hover td { background: #111d2e; }

  /* 인라인 뱃지 */
  .badge-free {
    background: #1e4a1e; color: #81c784;
    font-size: 0.71rem; padding: 2px 7px; border-radius: 4px; white-space: nowrap;
  }
  .badge-sale {
    background: #1a2e48; color: #64b5f6;
    font-size: 0.71rem; padding: 2px 7px; border-radius: 4px; white-space: nowrap;
  }
  .rank-diff-cell { font-size: 0.8rem; }

  a.steam-link { color: inherit; text-decoration: none; }
  a.steam-link:hover { text-decoration: underline; opacity: 0.85; }

  /* 이름 컬러 */
  .name-free { color: #a5d6a7; }
  .name-sale { color: #90caf9; }

  .updated { font-size: 0.73rem; color: #444; margin-top: 18px; }
  .error   { color: #f44336; padding: 20px; }
  .loading { color: #888; padding: 20px; }
</style>
</head>
<body>

<h1>🌐 붉은사막 글로벌 경쟁작 트래커</h1>
<p class="subtitle">Steam Global Top Sellers 기준 — 붉은사막 상위 무료/할인 게임</p>

<div id="app"><p class="loading">데이터 로딩 중...</p></div>

<script>
let chartInstance = null;

function diffHtml(v) {
  if (v > 0) return `<span class="up">▲${v}</span>`;
  if (v < 0) return `<span class="down">▼${Math.abs(v)}</span>`;
  return `<span class="flat">—</span>`;
}

function renderChart(rankHistory) {
  const ctx = document.getElementById('rankChart');
  if (!ctx || !rankHistory || rankHistory.length < 2) {
    document.getElementById('chartWrap').style.display = 'none';
    return;
  }

  const labels = rankHistory.map(p => {
    const d = new Date(p.t);
    return d.toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
  });
  const ranks = rankHistory.map(p => p.rank);

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: ranks,
        borderColor: '#4a9eff',
        backgroundColor: 'rgba(74,158,255,0.08)',
        borderWidth: 2,
        pointRadius: ranks.length > 30 ? 0 : 3,
        pointHoverRadius: 5,
        pointBackgroundColor: '#4a9eff',
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          reverse: true,        // 1위가 위쪽
          min: 1,
          grid: { color: '#1e2535' },
          ticks: { color: '#555', stepSize: 10 }
        },
        x: {
          grid: { color: '#1e2535' },
          ticks: {
            color: '#555', maxTicksLimit: 8,
            maxRotation: 0
          }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.parsed.y}위`
          }
        }
      }
    }
  });
}

async function load() {
  const app = document.getElementById('app');
  try {
    const [resMain, resHist] = await Promise.all([
      fetch('data/global_rivals.json?t=' + Date.now()),
      fetch('data/global_rank_history.json?t=' + Date.now()).catch(() => null),
    ]);

    if (!resMain.ok) throw new Error('global_rivals.json 없음');
    const d = await resMain.json();
    const rankHistory = resHist && resHist.ok ? await resHist.json() : [];

    if (!d.crimson_desert_rank) {
      app.innerHTML = '<p class="error">⚠️ 300위 안에 붉은사막 없음</p>';
      return;
    }

    const rivals   = d.rivals || [];
    const freeList = rivals.filter(r => r.is_free);
    const saleList = rivals.filter(r => r.is_discounted);

    const rows = rivals.map(r => {
      const isFree = r.is_free;
      const rowCls  = isFree ? 'row-free' : 'row-sale';
      const nameCls = isFree ? 'name-free' : 'name-sale';
      const badge   = isFree
        ? '<span class="badge-free">FREE</span>'
        : `<span class="badge-sale">-${r.discount_pct}%</span>`;
      return `<tr class="${rowCls}">
        <td style="color:#555">${r.rank}</td>
        <td><a class="steam-link ${nameCls}" href="https://store.steampowered.com/app/${r.app_id}/" target="_blank">${r.name}</a></td>
        <td>${badge}</td>
        <td class="rank-diff-cell">${diffHtml(r.rank_diff || 0)}</td>
      </tr>`;
    }).join('');

    const dtStr = new Date(d.generated_at).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });

    app.innerHTML = `
      <div class="rank-card">
        <div>
          <div class="rank-label">글로벌 순위</div>
          <div class="rank-num"><a href="https://store.steampowered.com/search/?filter=globaltopsellers" target="_blank" style="color:inherit;text-decoration:none;">${d.crimson_desert_rank}위</a></div>
        </div>
        <div>
          <div class="rank-label">전회 대비</div>
          <div class="rank-diff">${diffHtml(d.rank_diff || 0)}</div>
        </div>
        <div>
          <div class="rank-label">경쟁작</div>
          <div class="rank-diff" style="color:#aaa">${rivals.length}개</div>
        </div>
      </div>

      <div class="chart-wrap" id="chartWrap">
        <div class="chart-title">📈 붉은사막 글로벌 순위 추이 (낮을수록 상위)</div>
        <canvas id="rankChart"></canvas>
      </div>

      <div class="section-title">
        무료/할인 경쟁작
        <span class="count-badge badge-free-pill">FREE ${freeList.length}</span>
        <span class="count-badge badge-sale-pill">할인 ${saleList.length}</span>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:46px">순위</th>
            <th>게임</th>
            <th style="width:76px">유형</th>
            <th style="width:80px">순위변동</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>

      <p class="updated">마지막 업데이트: ${dtStr}</p>
    `;

    renderChart(rankHistory);

  } catch (e) {
    app.innerHTML = `<p class="error">❌ 데이터 로드 실패: ${e.message}<br>먼저 global_rival_tracker.py를 실행하세요.</p>`;
  }
}

load();
</script>
</body>
</html>
