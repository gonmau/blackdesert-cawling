<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>붉은사막 글로벌 경쟁작 트래커</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0e1117; color: #e0e0e0; padding: 20px; }

  h1 { font-size: 1.3rem; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

  .rank-card {
    background: #1a1f2e;
    border: 1px solid #2a3050;
    border-radius: 12px;
    padding: 20px 28px;
    display: inline-flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
  }
  .rank-num { font-size: 3rem; font-weight: 700; color: #4a9eff; line-height: 1; }
  .rank-label { font-size: 0.8rem; color: #888; }
  .rank-diff { font-size: 1.1rem; font-weight: 600; }
  .up { color: #4caf50; }
  .down { color: #f44336; }
  .flat { color: #888; }

  .section-title {
    font-size: 0.9rem;
    color: #aaa;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid #2a3050;
  }
  .count-badge {
    display: inline-block;
    background: #1e3a5f;
    color: #4a9eff;
    font-size: 0.75rem;
    padding: 1px 8px;
    border-radius: 10px;
    margin-left: 8px;
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th {
    text-align: left;
    padding: 8px 12px;
    color: #666;
    font-weight: 500;
    background: #13171f;
    position: sticky;
    top: 0;
  }
  td { padding: 8px 12px; border-bottom: 1px solid #1a1f2e; vertical-align: middle; }
  tr:hover td { background: #1a1f2e; }

  .badge-free {
    background: #1a3a1a;
    color: #66bb6a;
    font-size: 0.72rem;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .badge-sale {
    background: #1a2a3a;
    color: #42a5f5;
    font-size: 0.72rem;
    padding: 2px 7px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .rank-diff-cell { font-size: 0.8rem; }

  .updated { font-size: 0.75rem; color: #555; margin-top: 20px; }
  .error { color: #f44336; padding: 20px; }
  .loading { color: #888; padding: 20px; }

  a.steam-link { color: #4a9eff; text-decoration: none; }
  a.steam-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>🌐 붉은사막 글로벌 경쟁작 트래커</h1>
<p class="subtitle">Steam Global Top Sellers 기준 — 붉은사막 상위에 있는 무료/할인 게임</p>

<div id="app"><p class="loading">데이터 로딩 중...</p></div>

<script>
async function load() {
  const app = document.getElementById('app');
  try {
    const res = await fetch('data/global_rivals.json?t=' + Date.now());
    if (!res.ok) throw new Error('파일 없음');
    const d = await res.json();

    if (!d.crimson_desert_rank) {
      app.innerHTML = '<p class="error">⚠️ 300위 안에 붉은사막 없음</p>';
      return;
    }

    const diff = d.rank_diff || 0;
    const diffStr = diff > 0 ? `<span class="up">▲${diff}</span>`
                  : diff < 0 ? `<span class="down">▼${Math.abs(diff)}</span>`
                  : `<span class="flat">—</span>`;

    const rivals = d.rivals || [];
    const freeCount = rivals.filter(r => r.is_free).length;
    const saleCount = rivals.filter(r => r.is_discounted).length;

    let rows = rivals.map(r => {
      const badge = r.is_free
        ? '<span class="badge-free">FREE</span>'
        : `<span class="badge-sale">-${r.discount_pct}%</span>`;
      const rd = r.rank_diff || 0;
      const rdStr = rd > 0 ? `<span class="up">▲${rd}</span>`
                  : rd < 0 ? `<span class="down">▼${Math.abs(rd)}</span>`
                  : '<span class="flat">—</span>';
      return `<tr>
        <td style="color:#666">${r.rank}</td>
        <td><a class="steam-link" href="https://store.steampowered.com/app/${r.app_id}/" target="_blank">${r.name}</a></td>
        <td>${badge}</td>
        <td class="rank-diff-cell">${rdStr}</td>
      </tr>`;
    }).join('');

    const dt = new Date(d.generated_at);
    const dtStr = dt.toLocaleString('ko-KR', {timeZone: 'Asia/Seoul'});

    app.innerHTML = `
      <div class="rank-card">
        <div>
          <div class="rank-label">글로벌 순위</div>
          <div class="rank-num">${d.crimson_desert_rank}위</div>
        </div>
        <div>
          <div class="rank-label">전회 대비</div>
          <div class="rank-diff">${diffStr}</div>
        </div>
        <div>
          <div class="rank-label">경쟁작</div>
          <div class="rank-diff" style="color:#aaa">${rivals.length}개</div>
        </div>
      </div>

      <div class="section-title">
        무료/할인 경쟁작
        <span class="count-badge">FREE ${freeCount}</span>
        <span class="count-badge">할인 ${saleCount}</span>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:50px">순위</th>
            <th>게임</th>
            <th style="width:80px">유형</th>
            <th style="width:80px">순위변동</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>

      <p class="updated">마지막 업데이트: ${dtStr}</p>
    `;
  } catch (e) {
    app.innerHTML = `<p class="error">❌ 데이터 로드 실패: ${e.message}<br>먼저 global_rival_tracker.py를 실행하세요.</p>`;
  }
}

load();
</script>
</body>
</html>
