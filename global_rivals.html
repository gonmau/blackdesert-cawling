<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>붉은사막 글로벌 경쟁작 트래커</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0e1117; color: #e0e0e0; padding: 20px; max-width: 960px; }

  h1 { font-size: 1.3rem; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 20px; }

  /* 상단 카드 */
  .rank-card {
    background: #1a1f2e;
    border: 1px solid #2a3050;
    border-radius: 12px;
    padding: 20px 28px;
    display: inline-flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 24px;
  }
  .rank-num { font-size: 3rem; font-weight: 700; color: #4a9eff; line-height: 1; }
  .rank-label { font-size: 0.78rem; color: #888; margin-bottom: 2px; }
  .rank-diff { font-size: 1.1rem; font-weight: 600; }
  .up   { color: #4caf50; }
  .down { color: #f44336; }
  .flat { color: #666; }

  /* 그래프 */
  .chart-wrap {
    background: #1a1f2e;
    border: 1px solid #2a3050;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
  }
  .chart-title { font-size: 0.85rem; color: #aaa; margin-bottom: 12px; }
  canvas { width: 100% !important; height: 180px !important; }

  /* 섹션 타이틀 */
  .section-title {
    font-size: 0.88rem;
    color: #aaa;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid #2a3050;
  }
  .count-badge {
    display: inline-block;
    font-size: 0.73rem;
    padding: 1px 8px;
    border-radius: 10px;
    margin-left: 6px;
  }
  .badge-free-pill { background: #1a3a1a; color: #66bb6a; }
  .badge-sale-pill { background: #1a2a3a; color: #42a5f5; }

  /* 테이블 */
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-bottom: 8px; }
  th {
    text-align: left; padding: 8px 12px;
    color: #555; font-weight: 500;
    background: #13171f;
    position: sticky; top: 0;
  }
  td { padding: 7px 12px; border-bottom: 1px solid #13171f; vertical-align: middle; }

  /* 행 색상 구분 */
  tr.row-free td       { background: #0f1e0f; }
  tr.row-free:hover td { background: #142814; }
  tr.row-sale td       { background: #0d1624; }
  tr.row-sale:hover td { background: #111d2e; }

  /* 인라인 뱃지 */
  .badge-free {
    background: #1e4a1e; color: #81c784;
    font-size: 0.71rem; padding: 2px 7px; border-radius: 4px; white-space: nowrap;
  }
  .badge-sale {
    background: #1a2e48; color: #64b5f6;
    font-size: 0.71rem; padding: 2px 7px; border-radius: 4px; white-space: nowrap;
  }
  .rank-diff-cell { font-size: 0.8rem; }

  a.steam-link { color: inherit; text-decoration: none; }
  a.steam-link:hover { text-decoration: underline; opacity: 0.85; }

  /* 이름 컬러 */
  .name-free { color: #a5d6a7; }
  .name-sale { color: #90caf9; }

  .updated { font-size: 0.73rem; color: #444; margin-top: 18px; }
  .error   { color: #f44336; padding: 20px; }
  .loading { color: #888; padding: 20px; }

  /* 실행 버튼 */
  .run-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .run-btn {
    background: #1a3a1a;
    color: #81c784;
    border: 1px solid #2e5e2e;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: background 0.15s, opacity 0.15s;
  }
  .run-btn:hover  { background: #1e4a1e; }
  .run-btn:active { opacity: 0.8; }
  .run-btn:disabled {
    background: #1a1f2e; color: #555; border-color: #2a3050;
    cursor: default;
  }
  .run-btn .spin {
    width: 12px; height: 12px;
    border: 2px solid #81c78455;
    border-top-color: #81c784;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .run-btn.loading .spin { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .run-status {
    font-size: 0.78rem;
    color: #888;
  }
  .run-status.ok   { color: #66bb6a; }
  .run-status.fail { color: #f44336; }

  .token-reset {
    font-size: 0.72rem;
    color: #555;
    background: none;
    border: none;
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
  }
  .token-reset:hover { color: #888; }
</style>
</head>
<body>

<h1>🌐 붉은사막 글로벌 경쟁작 트래커</h1>
<p class="subtitle">Steam Global Top Sellers 기준 — 붉은사막 상위 무료/할인 게임</p>

<div class="run-bar">
  <button id="runBtn" class="run-btn" onclick="runWorkflow()">
    <span class="spin"></span>
    <span id="runBtnLabel">🔄 지금 갱신</span>
  </button>
  <span id="runStatus" class="run-status"></span>
  <button id="tokenResetBtn" class="token-reset" style="display:none" onclick="resetToken()">토큰 재설정</button>
</div>

<div id="app"><p class="loading">데이터 로딩 중...</p></div>

<script>
let chartInstance = null;

function diffHtml(v) {
  if (v > 0) return `<span class="up">▲${v}</span>`;
  if (v < 0) return `<span class="down">▼${Math.abs(v)}</span>`;
  return `<span class="flat">—</span>`;
}

function renderChart(rankHistory) {
  const ctx = document.getElementById('rankChart');
  if (!ctx || !rankHistory || rankHistory.length < 2) {
    document.getElementById('chartWrap').style.display = 'none';
    return;
  }

  const labels = rankHistory.map(p => {
    const d = new Date(p.t);
    return d.toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
  });
  const ranks = rankHistory.map(p => p.rank);

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: ranks,
        borderColor: '#4a9eff',
        backgroundColor: 'rgba(74,158,255,0.08)',
        borderWidth: 2,
        pointRadius: ranks.length > 30 ? 0 : 3,
        pointHoverRadius: 5,
        pointBackgroundColor: '#4a9eff',
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          reverse: true,        // 1위가 위쪽
          min: 1,
          grid: { color: '#1e2535' },
          ticks: { color: '#555', stepSize: 10 }
        },
        x: {
          grid: { color: '#1e2535' },
          ticks: {
            color: '#555', maxTicksLimit: 8,
            maxRotation: 0
          }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.parsed.y}위`
          }
        }
      }
    }
  });
}

async function load() {
  const app = document.getElementById('app');
  try {
    const [resMain, resHist] = await Promise.all([
      fetch('data/global_rivals.json?t=' + Date.now()),
      fetch('data/global_rank_history.json?t=' + Date.now()).catch(() => null),
    ]);

    if (!resMain.ok) throw new Error('global_rivals.json 없음');
    const d = await resMain.json();
    const rankHistory = resHist && resHist.ok ? await resHist.json() : [];

    if (!d.crimson_desert_rank) {
      app.innerHTML = '<p class="error">⚠️ 300위 안에 붉은사막 없음</p>';
      return;
    }

    const rivals   = d.rivals || [];
    const freeList = rivals.filter(r => r.is_free);
    const saleList = rivals.filter(r => r.is_discounted);

    const rows = rivals.map(r => {
      const isFree = r.is_free;
      const rowCls  = isFree ? 'row-free' : 'row-sale';
      const nameCls = isFree ? 'name-free' : 'name-sale';
      const badge   = isFree
        ? '<span class="badge-free">FREE</span>'
        : `<span class="badge-sale">-${r.discount_pct}%</span>`;
      return `<tr class="${rowCls}">
        <td style="color:#555">${r.rank}</td>
        <td><a class="steam-link ${nameCls}" href="https://store.steampowered.com/app/${r.app_id}/" target="_blank">${r.name}</a></td>
        <td>${badge}</td>
        <td class="rank-diff-cell">${diffHtml(r.rank_diff || 0)}</td>
      </tr>`;
    }).join('');

    const dtStr = new Date(d.generated_at).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });

    app.innerHTML = `
      <div class="rank-card">
        <div>
          <div class="rank-label">글로벌 순위</div>
          <div class="rank-num"><a href="https://store.steampowered.com/search/?filter=globaltopsellers" target="_blank" style="color:inherit;text-decoration:none;">${d.crimson_desert_rank}위</a></div>
        </div>
        <div>
          <div class="rank-label">전회 대비</div>
          <div class="rank-diff">${diffHtml(d.rank_diff || 0)}</div>
        </div>
        <div>
          <div class="rank-label">경쟁작</div>
          <div class="rank-diff" style="color:#aaa">${rivals.length}개</div>
        </div>
      </div>

      <div class="chart-wrap" id="chartWrap">
        <div class="chart-title">📈 붉은사막 글로벌 순위 추이 (낮을수록 상위)</div>
        <canvas id="rankChart"></canvas>
      </div>

      <div class="section-title">
        무료/할인 경쟁작
        <span class="count-badge badge-free-pill">FREE ${freeList.length}</span>
        <span class="count-badge badge-sale-pill">할인 ${saleList.length}</span>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:46px">순위</th>
            <th>게임</th>
            <th style="width:76px">유형</th>
            <th style="width:80px">순위변동</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>

      <p class="updated">마지막 업데이트: ${dtStr}</p>
    `;

    renderChart(rankHistory);

  } catch (e) {
    app.innerHTML = `<p class="error">❌ 데이터 로드 실패: ${e.message}<br>먼저 global_rival_tracker.py를 실행하세요.</p>`;
  }
}

/* ===== GitHub Actions 실행 버튼 ===== */
const GH_OWNER     = 'gonmau';
const GH_REPO      = 'blackdesert-cawling';
const GH_WORKFLOW  = 'global_rival_tracker.yml';
const GH_BRANCH    = 'main';
const TOKEN_KEY    = 'gh_pat_blackdesert_cawling';

function getToken() {
  let t = sessionStorage.getItem(TOKEN_KEY);
  if (!t) {
    t = prompt('GitHub Personal Access Token을 입력하세요.\n(Actions: write 권한 필요, 이 브라우저 탭에만 임시 저장됩니다)');
    if (t) sessionStorage.setItem(TOKEN_KEY, t.trim());
  }
  return t ? t.trim() : null;
}

function resetToken() {
  sessionStorage.removeItem(TOKEN_KEY);
  document.getElementById('tokenResetBtn').style.display = 'none';
  setStatus('토큰을 삭제했습니다. 다음 실행 시 다시 입력하세요.', '');
}

function setStatus(msg, cls) {
  const el = document.getElementById('runStatus');
  el.textContent = msg;
  el.className = 'run-status' + (cls ? ' ' + cls : '');
}

function setBtnLoading(isLoading, label) {
  const btn = document.getElementById('runBtn');
  const lbl = document.getElementById('runBtnLabel');
  btn.disabled = isLoading;
  btn.classList.toggle('loading', isLoading);
  if (label) lbl.textContent = label;
}

async function ghApi(path, token, opts = {}) {
  const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}${path}`, {
    ...opts,
    headers: {
      'Accept': 'application/vnd.github+json',
      'Authorization': `Bearer ${token}`,
      'X-GitHub-Api-Version': '2022-11-28',
      ...(opts.headers || {}),
    },
  });
  return res;
}

async function runWorkflow() {
  const token = getToken();
  if (!token) return;

  document.getElementById('tokenResetBtn').style.display = 'inline';
  setBtnLoading(true, '실행 요청 중...');
  setStatus('');

  try {
    const dispatchTime = new Date();

    const dispatchRes = await ghApi(`/actions/workflows/${GH_WORKFLOW}/dispatches`, token, {
      method: 'POST',
      body: JSON.stringify({ ref: GH_BRANCH }),
    });

    if (dispatchRes.status === 401 || dispatchRes.status === 403) {
      sessionStorage.removeItem(TOKEN_KEY);
      throw new Error('토큰이 유효하지 않거나 권한이 없습니다 (Actions: write 필요)');
    }
    if (!dispatchRes.ok) {
      throw new Error(`실행 요청 실패 (HTTP ${dispatchRes.status})`);
    }

    setBtnLoading(true, '실행 대기 중...');
    setStatus('워크플로우 실행을 요청했습니다. 진행 상황을 확인하는 중...');

    // 새로 생성된 run을 찾을 때까지 폴링
    let run = null;
    for (let i = 0; i < 10 && !run; i++) {
      await sleep(2500);
      const runsRes = await ghApi(
        `/actions/workflows/${GH_WORKFLOW}/runs?event=workflow_dispatch&per_page=5`,
        token
      );
      if (!runsRes.ok) continue;
      const runsData = await runsRes.json();
      run = (runsData.workflow_runs || []).find(
        r => new Date(r.created_at) >= new Date(dispatchTime.getTime() - 5000)
      );
    }

    if (!run) {
      setStatus('실행은 요청되었지만 상태 확인에 실패했습니다. GitHub Actions 탭에서 확인하세요.', '');
      setBtnLoading(false, '🔄 지금 갱신');
      return;
    }

    setStatus('워크플로우 실행 중...', '');

    // 완료될 때까지 폴링 (최대 ~5분)
    for (let i = 0; i < 60; i++) {
      const runRes = await ghApi(`/actions/runs/${run.id}`, token);
      if (runRes.ok) {
        run = await runRes.json();
        if (run.status === 'completed') break;
      }
      setBtnLoading(true, `실행 중... (${run.status})`);
      await sleep(5000);
    }

    if (run.status !== 'completed') {
      setStatus('실행이 아직 끝나지 않았습니다. 잠시 후 새로고침 해주세요.', '');
      setBtnLoading(false, '🔄 지금 갱신');
      return;
    }

    if (run.conclusion === 'success') {
      setStatus('✅ 갱신 완료! 데이터를 불러옵니다...', 'ok');
      setBtnLoading(false, '🔄 지금 갱신');
      await sleep(800);
      load();
    } else {
      setStatus(`❌ 워크플로우 실패 (${run.conclusion})`, 'fail');
      setBtnLoading(false, '🔄 지금 갱신');
    }

  } catch (e) {
    setStatus(`❌ ${e.message}`, 'fail');
    setBtnLoading(false, '🔄 지금 갱신');
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

if (sessionStorage.getItem(TOKEN_KEY)) {
  document.getElementById('tokenResetBtn').style.display = 'inline';
}

load();
</script>
</body>
</html>
