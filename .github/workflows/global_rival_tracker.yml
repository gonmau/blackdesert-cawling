name: Global Rival Tracker

on:
  schedule:
  - cron: "0 * * * *"   # 매시간 0분에 실행 (KST 기준 00/01/02/.../23시)
workflow_dispatch:        # 수동 실행

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run tracker
        run: python global_rival_tracker.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/global_rivals.json data/global_history.json data/global_rank_history.json
          git diff --staged --quiet || git commit -m "chore: update global rivals $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
