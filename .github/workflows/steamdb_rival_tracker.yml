name: SteamDB Rival Tracker

on:
  schedule:
    - cron: "30 */6 * * *"   # 6시간마다 (global_rival_tracker와 30분 엇갈리게)
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium --with-deps

      - name: Run tracker
        run: python steamdb_rival_tracker.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/steamdb_rivals.json data/steamdb_history.json data/steamdb_rank_history.json
          git diff --staged --quiet || git commit -m "chore: update steamdb rivals $(date +'%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push
